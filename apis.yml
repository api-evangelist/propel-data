aid: propel-data
url: https://raw.githubusercontent.com/api-evangelist/propel-data/refs/heads/main/apis.yml
name: Propel
kind: company
description: Propel is a customer-facing analytics platform that puts a fast GraphQL
  analytics API in front of a data warehouse. Teams connect a Data Source (Snowflake,
  BigQuery, S3, Redshift, ClickHouse, Postgres, Kafka, webhooks), sync it into
  high-speed Data Pools, define Metrics, and serve sub-second Counter, Time Series,
  and Leaderboard queries to in-product dashboards, with multi-tenant Policies and
  OAuth2 Applications for access control.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Analytics
- GraphQL
- Data Warehouse
- Metrics
- Customer Facing Analytics
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
